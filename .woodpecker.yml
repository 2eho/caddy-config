skip_clone: true

when:
  - branch: main
    event: [push]

steps:
  deploy:
    image: alpine:3.21
    environment:
      GIT_DEPLOY_KEY:
        from_secret: GIT_DEPLOY_KEY
      VPS_HOST:
        from_secret: VPS_HOST
    commands: |
      apk add --no-cache openssh-client curl

      echo "$GIT_DEPLOY_KEY" > /tmp/id_ed25519
      chmod 600 /tmp/id_ed25519

      # 从 GitHub 下载 Caddyfile
      curl -sL -o /tmp/Caddyfile \
        https://raw.githubusercontent.com/2eho/caddy-config/main/Caddyfile

      # 传到服务器
      scp -o StrictHostKeyChecking=no -i /tmp/id_ed25519 \
        /tmp/Caddyfile "${VPS_HOST}:/opt/novelcat-edge/Caddyfile"

      # reload
      ssh -o StrictHostKeyChecking=no -i /tmp/id_ed25519 "${VPS_HOST}" \
        sudo docker exec novelcat-edge caddy reload --config /etc/caddy/Caddyfile

