skip_clone: true

when:
  - branch: main
    event: [push]

steps:
  # push 时自动同步
  deploy:
    image: docker:28-cli
    when:
      - evaluate: 'CI_PIPELINE_EVENT != "manual"'
    commands: |
      docker exec novelcat-edge sh -c "
        curl -sL -o /etc/caddy/Caddyfile \
          https://raw.githubusercontent.com/2eho/caddy-config/main/Caddyfile
        caddy reload --config /etc/caddy/Caddyfile
      "

  # 手动触发：add/delete 域名
  manage:
    image: docker:28-cli
    when:
      - evaluate: 'CI_PIPELINE_EVENT == "manual" && (CADDY_ACTION == "add" || CADDY_ACTION == "delete")'
    commands: |
      apk add --no-cache curl

      if [ -z "$CADDY_DOMAIN" ]; then
        echo "用法: CADDY_ACTION=add|delete  CADDY_DOMAIN=xxx.novelcat.cloud  CADDY_PORT=端口"
        exit 1
      fi

      docker cp novelcat-edge:/etc/caddy/Caddyfile /tmp/Caddyfile

      if [ "$CADDY_ACTION" = "add" ]; then
        if [ -z "$CADDY_PORT" ]; then
          echo "add 需要 CADDY_PORT"
          exit 1
        fi
        if grep -q "^${CADDY_DOMAIN} {" /tmp/Caddyfile 2>/dev/null; then
          echo "域名 ${CADDY_DOMAIN} 已存在"
        else
          printf "\n# %s\n%s {\n    encode gzip\n    reverse_proxy 127.0.0.1:%s\n}\n" \
            "$CADDY_DOMAIN" "$CADDY_DOMAIN" "$CADDY_PORT" >> /tmp/Caddyfile
          echo "已添加 ${CADDY_DOMAIN} → :${CADDY_PORT}"
        fi
      elif [ "$CADDY_ACTION" = "delete" ]; then
        sed -i "/^# ${CADDY_DOMAIN}/,/^$/d" /tmp/Caddyfile
        sed -i "/^${CADDY_DOMAIN} {/,/^}/d" /tmp/Caddyfile
        echo "已删除 ${CADDY_DOMAIN}"
      fi

      docker cp /tmp/Caddyfile novelcat-edge:/etc/caddy/Caddyfile
      docker exec novelcat-edge caddy reload --config /etc/caddy/Caddyfile
