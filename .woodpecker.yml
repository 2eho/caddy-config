skip_clone: true

when:
  - branch: main
    event: [push]

steps:
  # push 时自动同步
  deploy:
    image: alpine:3.21
    when:
      - evaluate: 'CI_PIPELINE_EVENT != "manual"'
    commands: |
      apk add --no-cache curl
      # 下载 Caddyfile 并通过系统 Caddy API 加载
      curl -sL https://raw.githubusercontent.com/2eho/caddy-config/main/Caddyfile \
        | curl -s -X PUT -H "Content-Type: text/plain" \
          --data-binary @- \
          http://127.0.0.1:2019/load

  # 手动触发：add/del
  manage:
    image: alpine:3.21
    when:
      - evaluate: 'CI_PIPELINE_EVENT == "manual"'
    commands: |
      apk add --no-cache curl

      if [ -z "$CADDY_INPUT" ]; then
        echo "用法: CADDY_INPUT=前缀 端口  或  del 前缀"
        echo "示例: CADDY_INPUT=beszel 8090   (添加)"
        echo "      CADDY_INPUT=del beszel    (删除)"
        exit 1
      fi

      FIRST="${CADDY_INPUT%% *}"
      REST="${CADDY_INPUT#* }"

      if [ "$FIRST" = "del" ]; then
        PREFIX="$REST"
        ACTION="del"
      else
        PREFIX="$FIRST"
        PORT="$REST"
        ACTION="add"
      fi

      DOMAIN="${PREFIX}.novelcat.cloud"

      # 获取当前配置
      curl -s http://127.0.0.1:2019/config/ > /tmp/current.json

      # add/del 逻辑操作 JSON 太复杂，直接用文件方式
      curl -sL -o /tmp/Caddyfile \
        https://raw.githubusercontent.com/2eho/caddy-config/main/Caddyfile

      if [ "$ACTION" = "add" ]; then
        if [ -z "$PORT" ]; then
          echo "添加需要端口"
          exit 1
        fi
        if grep -qE "^\s*${DOMAIN}\s*{" /tmp/Caddyfile 2>/dev/null; then
          echo "域名 ${DOMAIN} 已存在"
        else
          printf "\n# %s\n%s {\n    encode gzip\n    reverse_proxy 127.0.0.1:%s\n}\n" \
            "$DOMAIN" "$DOMAIN" "$PORT" >> /tmp/Caddyfile
          echo "已添加 ${DOMAIN} → :${PORT}"
        fi
      elif [ "$ACTION" = "del" ]; then
        if ! grep -qE "^\s*${DOMAIN}\s*{" /tmp/Caddyfile 2>/dev/null; then
          echo "域名 ${DOMAIN} 不存在，不执行"
          exit 0
        fi
        sed -i "/^# ${DOMAIN}/,/^}/d" /tmp/Caddyfile
        sed -i "/^${DOMAIN} {/,/^}/d" /tmp/Caddyfile
        sed -i '/^$/N;/^\n$/D' /tmp/Caddyfile
        echo "已删除 ${DOMAIN}"
      fi

      # 通过 API 加载新配置
      curl -s -X POST -H "Content-Type: text/caddyfile" \
        --data-binary @/tmp/Caddyfile \
        http://127.0.0.1:2019/load
