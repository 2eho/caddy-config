skip_clone: true

when:
  - branch: main
    event: [push]

steps:
  deploy:
    image: curlimages/curl:latest
    commands: |
      curl -sL -o /tmp/Caddyfile \
        https://raw.githubusercontent.com/2eho/caddy-config/main/Caddyfile

      cp /tmp/Caddyfile /opt/novelcat-edge/Caddyfile

      docker exec novelcat-edge caddy reload --config /etc/caddy/Caddyfile
