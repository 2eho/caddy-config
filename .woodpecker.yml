skip_clone: true

when:
  - branch: main
    event: [push]

steps:
  # push 时自动同步
  deploy:
    image: docker:28-cli
    when:
      - evaluate: 'CI_PIPELINE_EVENT != "manual"'
    commands: |
      docker exec novelcat-edge sh -c "
        curl -sL -o /etc/caddy/Caddyfile \
          https://raw.githubusercontent.com/2eho/caddy-config/main/Caddyfile
        caddy reload --config /etc/caddy/Caddyfile
      "

  # 手动触发：add/del
  manage:
    image: docker:28-cli
    when:
      - evaluate: 'CI_PIPELINE_EVENT == "manual" && (CADDY_ACTION == "add" || CADDY_ACTION == "del")'
    commands: |
      apk add --no-cache curl

      if [ -z "$CADDY_DOMAIN" ]; then
        echo "用法: CADDY_ACTION=add|del  CADDY_DOMAIN=前缀  CADDY_PORT=端口"
        exit 1
      fi

      DOMAIN="${CADDY_DOMAIN}.novelcat.cloud"

      docker cp novelcat-edge:/etc/caddy/Caddyfile /tmp/Caddyfile

      if [ "$CADDY_ACTION" = "add" ]; then
        if [ -z "$CADDY_PORT" ]; then
          echo "add 需要 CADDY_PORT"
          exit 1
        fi
        if grep -qE "^\s*${DOMAIN}\s*{" /tmp/Caddyfile 2>/dev/null; then
          echo "域名 ${DOMAIN} 已存在"
        else
          printf "\n# %s\n%s {\n    encode gzip\n    reverse_proxy 127.0.0.1:%s\n}\n" \
            "$DOMAIN" "$DOMAIN" "$CADDY_PORT" >> /tmp/Caddyfile
          echo "已添加 ${DOMAIN} → :${CADDY_PORT}"
        fi

      elif [ "$CADDY_ACTION" = "del" ]; then
        if ! grep -qE "^\s*${DOMAIN}\s*{" /tmp/Caddyfile 2>/dev/null; then
          echo "域名 ${DOMAIN} 不存在，不执行"
          exit 0
        fi
        sed -i "/^# ${DOMAIN}/,/^}/d" /tmp/Caddyfile
        sed -i "/^${DOMAIN} {/,/^}/d" /tmp/Caddyfile
        sed -i '/^$/N;/^\n$/D' /tmp/Caddyfile
        echo "已删除 ${DOMAIN}"
      fi

      docker cp /tmp/Caddyfile novelcat-edge:/etc/caddy/Caddyfile
      docker exec novelcat-edge caddy reload --config /etc/caddy/Caddyfile
